services:
  - type: web
    name: naics-classifier
    env: node
    plan: starter
    buildCommand: npm ci && npm run build:index
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: OPENAI_API_KEY
        sync: false
      - key: EMBED_MODEL
        value: text-embedding-3-small
      - key: LLM_MODEL
        value: gpt-4o-mini
      - key: TOPK
        value: "25"
